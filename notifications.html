<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإشعارات</title>

    <link rel="stylesheet" href="notifications.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="container">

    <div class="header">
        <a href="account.html" class="back">
            <i class="fa-solid fa-arrow-right"></i>
        </a>

        <h2>الإشعارات</h2>
    </div>

    <div id="notificationsList">

        <div class="notification unread">
            <i class="fa-solid fa-gift icon"></i>

            <div class="content">
                <h3>مرحباً بك 🎉</h3>
                <p>أهلاً بك في Kurdo Rewards، نتمنى لك تجربة ممتعة.</p>
                <span>الآن</span>
            </div>
        </div>

        <div class="notification">
            <i class="fa-solid fa-gamepad icon"></i>

            <div class="content">
                <h3>عروض جديدة</h3>
                <p>تمت إضافة عروض وألعاب جديدة يمكنك البدء بها.</p>
                <span>منذ ساعة</span>
            </div>
        </div>

        <div class="notification">
            <i class="fa-solid fa-wallet icon"></i>

            <div class="content">
                <h3>السحب</h3>
                <p>سيتم عرض حالة طلبات السحب هنا.</p>
                <span>منذ يوم</span>
            </div>
        </div>

    </div>

</div>

<script type="module" src="notifications.js"></script>

</body>
</html>
