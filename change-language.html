<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تغيير اللغة</title>

<link rel="stylesheet" href="home.css">

<style>

body{
background:#f5f5f5;
font-family:Cairo,sans-serif;
}

.card{
max-width:450px;
margin:30px auto;
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.12);
}

h2{
text-align:center;
color:#176b2d;
margin-bottom:25px;
}

select{
width:100%;
padding:15px;
font-size:17px;
border-radius:12px;
border:1px solid #ddd;
margin-bottom:20px;
}

button{
width:100%;
padding:15px;
background:#176b2d;
color:#fff;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
}

a{
display:block;
text-align:center;
margin-top:20px;
text-decoration:none;
color:#176b2d;
font-weight:bold;
}

</style>

</head>

<body>

<div class="card">

<h2>تغيير اللغة</h2>

<select id="language">
<option value="ar">🇸🇦 العربية</option>
<option value="ku">🇹🇯 Kurdî (Kurmanji)</option>
<option value="en">🇬🇧 English</option>
</select>

<button id="saveLanguage">
حفظ اللغة
</button>

<a href="account.html">
العودة للحساب
</a>

</div>

<script src="change-language.js"></script>

</body>
</html>
