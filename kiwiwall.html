<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KiwiWall</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f5f5f5;
    font-family:Cairo,sans-serif;
}

iframe{
    width:100%;
    height:100vh;
    border:none;
    display:none;
}

#loading{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-size:18px;
    color:#333;
}
</style>

</head>

<body>

<div id="loading">جاري تحميل العروض...</div>

<iframe id="offerwall"></iframe>

<script type="module">

import { auth } from "./firebase.js";

import {
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const iframe = document.getElementById("offerwall");
const loading = document.getElementById("loading");

onAuthStateChanged(auth, (user) => {

    if (!user) {
        window.location.href = "index.html";
        return;
    }

    iframe.onload = () => {
        loading.style.display = "none";
        iframe.style.display = "block";
    };

    iframe.src = `https://offers.kiwiwall.com/wall/plc_00lc8t0v?user_id=${encodeURIComponent(user.uid)}`;

});

</script>

</body>

</html>
