<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تغيير كلمة المرور</title>

<link rel="stylesheet" href="home.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

body{
background:#f5f5f5;
font-family:Cairo,sans-serif;
}

.card{
max-width:450px;
margin:30px auto;
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.12);
}

h2{
text-align:center;
color:#176b2d;
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:12px;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#176b2d;
color:#fff;
font-size:18px;
cursor:pointer;
}

a{
display:block;
text-align:center;
margin-top:20px;
color:#176b2d;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<div class="card">

<h2>تغيير كلمة المرور</h2>

<input type="password" id="newPassword" placeholder="كلمة المرور الجديدة">

<input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور">

<button id="changeBtn">
<i class="fas fa-lock"></i>
تغيير كلمة المرور
</button>

<a href="account.html">العودة للحساب</a>

</div>

<script type="module" src="change-password.js"></script>

</body>
</html>
