<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>السحب إلى شام كاش</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Cairo,sans-serif;
}

body{
background:#f5f7fb;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

.logo{
text-align:center;
margin-top:15px;
}

.logo img{
width:180px;
}

h1{
text-align:center;
margin-top:15px;
font-size:34px;
color:#222;
}

.sub{
text-align:center;
color:#666;
margin-bottom:25px;
}

.balance{
background:linear-gradient(135deg,#1b8b42,#39b95d);
color:#fff;
padding:25px;
border-radius:20px;
margin-bottom:25px;
box-shadow:0 8px 25px rgba(0,0,0,.15);
}

.balance h2{
font-size:20px;
margin-bottom:10px;
}

.balance p{
font-size:38px;
font-weight:bold;
}

.card{
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

label{
display:block;
font-size:18px;
margin-bottom:8px;
font-weight:bold;
}

input{
width:100%;
padding:16px;
border:1px solid #ddd;
border-radius:12px;
font-size:18px;
margin-bottom:20px;
outline:none;
}

input:focus{
border-color:#1b8b42;
}

.note{
background:#fff8dd;
padding:15px;
border-radius:12px;
text-align:center;
font-size:18px;
margin-bottom:20px;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:14px;
background:#1b8b42;
color:#fff;
font-size:22px;
font-weight:bold;
cursor:pointer;
}

.info{
margin-top:25px;
background:#eef9f0;
padding:20px;
border-radius:15px;
text-align:center;
color:#1b8b42;
}
</style>

</head>
<body>

<div class="container">

<div class="logo">
<img src="shamcash.png" alt="ShamCash">
</div>

<h1>السحب إلى شام كاش</h1>

<p class="sub">
يمكنك سحب أرباحك مباشرة إلى حساب شام كاش الخاص بك
</p>

<div class="balance">
<h2>رصيدك الحالي</h2>
<p id="balanceText">0.00 USD</p>
</div>

<div class="card">

<label>رقم حساب شام كاش</label>
<input
type="text"
id="uid"
placeholder="أدخل رقم حساب شام كاش">

<label>مبلغ السحب (USD)</label>
<input
type="number"
id="amount"
min="0.10"
step="0.10"
placeholder="0.10">

<div class="note">
⭐ الحد الأد
