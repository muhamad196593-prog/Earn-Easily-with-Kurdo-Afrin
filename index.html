<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kurdo Rewards</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>
<body>

<div class="top-bg">
    <div class="overlay"></div>

    <div class="logo">
        <h1>Kurdo Rewards</h1>
        <p>اربح بسهولة مع كردو</p>
    </div>
</div>

<div class="login-card">

    <h2>مرحباً بك</h2>

    <p class="sub">
        سجل دخولك للاستفادة من جميع المميزات
    </p>

    <div class="input-box">
        <i class="fa-solid fa-envelope"></i>
        <input
        type="email"
        id="email"
        placeholder="البريد الإلكتروني">
    </div>

    <div class="input-box">
        <i class="fa-solid fa-lock"></i>
        <input
        type="password"
        id="password"
        placeholder="كلمة المرور">
    </div>

    <div class="options">

        <label>
            <input type="checkbox">
            تذكرني
        </label>

        <a href="#">
            نسيت كلمة المرور؟
        </a>

    </div>

    <button id="loginBtn" class="login-btn">
        تسجيل الدخول
    </button>

    <button id="registerBtn" class="register-btn">
        إنشاء حساب جديد
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
