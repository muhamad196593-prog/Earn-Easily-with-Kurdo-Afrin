<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kurdo Rewards</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>
<body>

<div class="top-bg">
    <div class="overlay"></div>

<div class="logo">

<img src="logo.png" alt="Kurdo Afrin" class="logo-img">

    <h1>اربح بسهولة مع كردو عفرين</h1>
<p>منصة موثوقة للربح السهل والآمن</p>

    
</div>
</div>

<div class="login-card">

    <h2>مرحباً بك</h2>

    <p class="sub">
        سجل دخولك للاستفادة من جميع المميزات
    </p>

    <div class="input-box">
        <i class="fa-solid fa-envelope"></i>
        <input
        type="email"
        id="email"
        placeholder="البريد الإلكتروني">
    </div>

<div class="input-box">
    <i class="fa-solid fa-lock"></i>

    <input
        type="password"
        id="password"
        placeholder="كلمة المرور">

    <i
        class="fa-solid fa-eye toggle-password"
        onclick="togglePassword()">
    </i>
</div>

    <div class="options">

        <label>
            <input type="checkbox">
            تذكرني
        </label>

        <a href="#">
            نسيت كلمة المرور؟
        </a>

    </div>
<div class="features">

    <div class="feature">
        <i class="fa-solid fa-shield-halved"></i>
        <span>آمن وموثوق</span>
    </div>

    <div class="feature">
        <i class="fa-solid fa-headset"></i>
        <span>دعم 24/7</span>
    </div>

    <div class="feature">
        <i class="fa-solid fa-coins"></i>
        <span>أرباح يومية</span>
    </div>

</div>
    <button id="loginBtn" class="login-btn">
        تسجيل الدخول
    </button>

    <button id="googleLoginBtn" class="register-btn">
    <i class="fa-brands fa-google"></i>
    تسجيل باستخدام Google
    </button>
    
</div>
<div id="registerForm" style="display:none;">
    <h2>إنشاء حساب</h2>

    <input type="email" id="registerEmail" placeholder="البريد الإلكتروني">

    <input type="password" id="registerPassword" placeholder="كلمة المرور">

    <button id="createAccountBtn">إنشاء الحساب</button>

    <a href="#" onclick="showLogin()">لديك حساب؟ تسجيل الدخول</a>
</div>
<script type="module" src="script.js"></script>
</body>
</html>
