<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>السحب</title>

<link rel="stylesheet" href="withdraw.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="header">
    <i class="fas fa-bars"></i>
    <h2>السحب</h2>
    <i class="far fa-bell"></i>
</div>

<div class="balance-card">

    <div class="balance-info">
        <p>رصيدك الحالي</p>
        <h1 id="points">0 <span>نقطة</span></h1>
        <h3 id="balance">0.00 $</h3>
        <p>الحد الأدنى للسحب: <b>100 نقطة = 0.10 $</b></p>
    </div>

    <div class="wallet-circle">
        <i class="fas fa-wallet"></i>
    </div>

</div>

<h3 class="title">اختر طريقة السحب</h3>

<!-- Binance -->
<a href="binance.html" class="method">

    <img src="binance.png" class="logo" alt="Binance">

    <div class="info">
        <h3>Binance</h3>
        <p>الحد الأدنى: 100 نقطة = 0.10 $</p>
    </div>

    <i class="fas fa-chevron-left"></i>

</a>

<!-- ShamCash -->
<a href="shamcash.html" class="method">

    <img src="shamcash.png" class="logo" alt="ShamCash">

    <div class="info">
        <h3>شام كاش</h3>
        <p>الحد الأدنى: 100 نقطة = 0.10 $</p>
    </div>

    <i class="fas fa-chevron-left"></i>

</a>

<div class="notice">
    <i class="fas fa-circle-info"></i>
    <span>يتم تنفيذ طلبات السحب خلال 24 ساعة.</span>
</div>

<h3 class="title">آخر عمليات السحب</h3>

<div class="history" id="history">

    <div class="item">
        <span style="width:100%;text-align:center;color:#777;padding:20px;">
            لا توجد عمليات سحب حتى الآن
        </span>
    </div>

</div>

<nav class="bottom-nav">

    <a href="home.html">
        <i class="fas fa-house"></i>
        <span>الرئيسية</span>
    </a>
