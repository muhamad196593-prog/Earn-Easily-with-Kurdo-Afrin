<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kurdo Rewards</title>

<link rel="stylesheet" href="home.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<header class="top-header">

    <a href="notifications.html" class="notification-btn">
        <i class="fas fa-bell"></i>
    </a>

    <h1 style="color:#000;" data-lang="home">الرئيسية</h1>

    <i class="fas fa-bars" style="color:#000;"></i>

</header>

<section class="balance-card">

    <div class="balance-text">

        <p data-lang="currentBalance">الرصيد الحالي</p>

        <h2 id="balance">0 نقطة</h2>

        <button type="button">
            <i class="fas fa-wallet"></i>
            <span data-lang="showWallet">عرض المحفظة</span>
        </button>

    </div>

    <div class="balance-image"></div>

</section>

<section class="offers-section">

    <h2 data-lang="offerCompanies">شركات العروض</h2>

    <a href="games.html" class="offer-card">
        <i class="fas fa-gamepad"></i>
        <span data-lang="games">🎮 الألعاب</span>
    </a>

</section>

<nav class="bottom-nav">

    <a href="home.html" class="active">
        <i class="fas fa-house"></i>
        <span data-lang="home">الرئيسية</span>
    </a>

    <a href="withdraw.html">
        <i class="fas fa-wallet"></i>
        <span data-lang="withdraw">السحب</span>
    </a>

    <a href="account.html">
        <i class="fas fa-user"></i>
        <span data-lang="account">الحساب</span>
    </a>

</nav>

<script type="module" src="home.js"></script>
<script src="language.js"></script>

</body>
</html>
